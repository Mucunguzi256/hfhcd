<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body style="margin:0;background:#f5f5f5">
<div id="nc-root" style="padding:2rem;text-align:center">Loading CMS...</div>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
window.INDEX_PAGE_PATH = "/admin/index.html";
CMS.init({
  config: {
    backend: {
      name: "git-gateway",
      repo: "Mucunguzi256/hfhcd",
      branch: "main",
      auth_type: "pkce",
      base_url: "https://auth.decapbridge.com",
      auth_endpoint: "/sites/dc335db9-2a5e-47b2-ba05-bdea4e2e3/pkce",
      auth_token_endpoint: "/sites/dc335db9-2a5e-47b2-ba05-bdea4e2e3/token",
      gateway_url: "https://gateway.decapbridge.com"
    },
    commit_messages: {
      create: "Create {{collection}} '{{slug}}' via DecapBridge",
      update: "Update {{collection}} '{{slug}}' via DecapBridge",
      delete: "Delete {{collection}} '{{slug}}' via DecapBridge",
      uploadMedia: "Upload '{{path}}' via DecapBridge",
      deleteMedia: "Delete '{{path}}' via DecapBridge"
    },
    auth: {
      email_claim: "email",
      first_name_claim: "first_name",
      last_name_claim: "last_name",
      avatar_url_claim: "avatar_url"
    },
    logo_url: "https://decapbridge.com/decapcms-with-bridge.svg",
    site_url: "https://www.hfhcd.org",
    media_folder: "public/images/uploads",
    collections: [
      {
        name: "causes",
        label: "Causes",
        folder: "src/content/causes",
        create: true,
        slug: "{{fields.title}}",
        fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Description", name: "description", widget: "text" },
          { label: "Goal", name: "goal", widget: "number", required: false },
          { label: "Raised", name: "raised", widget: "number", required: false },
          { label: "Image", name: "image", widget: "image", required: false },
          { label: "Content", name: "body", widget: "markdown" }
        ]
      }
    ]
  }
});
</script>
</body>
</html>
