backend:
  name: git-gateway
  repo: Mucunguzi256/hfhcd
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/dc335db9-2a5e-47b2-ba05-bdea4e2e3/pkce
  auth_token_endpoint: /sites/dc335db9-2a5e-47b2-ba05-bdea4e2e3/token
  gateway_url: https://gateway.decapbridge.com

commit_messages:
  create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://www.hfhcd.org

media_folder: "public/images/uploads"

collections:
  - name: "causes"
    label: "Causes"
    folder: "src/content/causes"
    create: true
    slug: "{{fields.title}}"
    fields:
      - { label: "Title", name: "title", widget: "string"}
      - { label: "Description", name: "description", widget: "text"}
      - { label: "Goal", name: "goal", widget: "number", required: false}
      - { label: "Raised", name: "raised", widget: "number", required: false}
      - { label: "Image", name: "image", widget: "image", required: false}
      - { label: "Content", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    slug: "{{fields.title}}"
    fields:
      - { label: "Title", name: "title", widget: "string"}
      - { label: "Content", name: "body", widget: "markdown"}